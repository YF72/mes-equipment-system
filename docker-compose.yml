services:
  mysql:
    image: mysql:8.4
    container_name: mes-equipment-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mes_equipment_db
      MYSQL_USER: mes_user
      MYSQL_PASSWORD: mes_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: