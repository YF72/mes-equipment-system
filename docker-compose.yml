services:
  mysql:
    image: mysql:8.4
    container_name: mes-equipment-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mes_equipment_db}
      MYSQL_USER: ${MYSQL_USER:-mes_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mes_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "${MYSQL_USER:-mes_user}",
          "-p${MYSQL_PASSWORD:-mes_password}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
